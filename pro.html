<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>骡式写作自检工具</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,'Microsoft YaHei',-apple-system,sans-serif;padding:28px;min-height:100vh;transition:background .4s,color .3s}
[data-theme=minimal]{--bg:linear-gradient(135deg,#f8f9fc 0%,#eef1f8 100%);--card-bg:#fff;--card-border:#edf0f5;--text:#1d1d1f;--text2:#8e8e98;--text3:#b8bcc6;--btn-bg:#1d1d1f;--accent:#6d28d9;--danger:#ff453a;--success:#30d158;--warn:#ff9f0a;--shadow:rgba(0,0,0,.04);--shadow-h:rgba(0,0,0,.15);--locked:#fafafe;--sec:#fff;--ta:#fff;--tab:#e4e8ee;--code:#f5f6f9;--pfree:#f1f2f6;--pfreec:#6e6e78;--pdeep:#f0ecfa;--pdeepc:#6d28d9;--pvip:#fef1e8;--pvipc:#c2410c;--rw:#f8f9fc;--fg:#fafbff}
[data-theme=aurora]{--bg:radial-gradient(ellipse at 50% 0,#1a1a3e,#0f0f23);--card-bg:rgba(22,33,62,.85);--card-border:rgba(255,255,255,.08);--text:#e0e0e0;--text2:#888;--text3:#555;--btn-bg:#7c3aed;--accent:#a78bfa;--danger:#e94560;--success:#4ade80;--warn:#fbbf24;--shadow:rgba(0,0,0,.2);--shadow-h:rgba(124,58,237,.3);--locked:rgba(22,33,62,.5);--sec:rgba(22,33,62,.85);--ta:rgba(22,33,62,.75);--tab:rgba(255,255,255,.1);--code:rgba(0,0,0,.3);--pfree:rgba(30,58,95,.6);--pfreec:#93c5fd;--pdeep:rgba(59,31,110,.6);--pdeepc:#c4b5fd;--pvip:rgba(124,61,18,.6);--pvipc:#fdba74;--rw:rgba(30,41,59,.7);--fg:rgba(28,25,23,.85)}
[data-theme=neon]{--bg:#0a0a0f;--card-bg:#12121a;--card-border:rgba(0,255,255,.15);--text:#e0f0f0;--text2:#7aa;--text3:#456;--btn-bg:#00ffcc;--accent:#00ffcc;--danger:#ff3366;--success:#00ff88;--warn:#ffbb00;--shadow:rgba(0,255,255,.05);--shadow-h:rgba(0,255,255,.2);--locked:#0d0d15;--sec:#12121a;--ta:#0d0d15;--tab:rgba(0,255,255,.12);--code:#0d0d15;--pfree:rgba(0,255,200,.08);--pfreec:#0ec;--pdeep:rgba(100,0,255,.12);--pdeepc:#a7f;--pvip:rgba(255,50,100,.1);--pvipc:#f46;--rw:#0d0d15;--fg:#0d0d15}
[data-theme=warm]{--bg:linear-gradient(135deg,#fef9f0 0%,#fdf2e2 100%);--card-bg:#fffcf5;--card-border:#f0e6d6;--text:#3d3229;--text2:#8f7d6a;--text3:#c4b5a5;--btn-bg:#c6512e;--accent:#c6512e;--danger:#c0392b;--success:#27ae60;--warn:#f39c12;--shadow:rgba(0,0,0,.04);--shadow-h:rgba(198,81,46,.15);--locked:#fdf6ed;--sec:#fffcf5;--ta:#fffcf5;--tab:#f0e6d6;--code:#fdf6ed;--pfree:#f5ede4;--pfreec:#7d6b58;--pdeep:#f0e6dc;--pdeepc:#c6512e;--pvip:#fce8d8;--pvipc:#b04422;--rw:#fdf6ed;--fg:#fffcf5}
[data-theme=forest]{--bg:linear-gradient(135deg,#0f1a12 0%,#1a2e1f 100%);--card-bg:rgba(26,46,31,.9);--card-border:rgba(100,180,120,.12);--text:#d0e8d4;--text2:#7aad83;--text3:#3d6b47;--btn-bg:#4a9e5a;--accent:#6fbf7f;--danger:#e05050;--success:#5ac06a;--warn:#e0b040;--shadow:rgba(0,0,0,.2);--shadow-h:rgba(74,158,90,.25);--locked:rgba(26,46,31,.7);--sec:rgba(26,46,31,.9);--ta:rgba(15,26,18,.8);--tab:rgba(100,180,120,.1);--code:rgba(15,26,18,.8);--pfree:rgba(74,158,90,.15);--pfreec:#7fcc8f;--pdeep:rgba(100,140,200,.12);--pdeepc:#8fc4f0;--pvip:rgba(200,150,60,.12);--pvipc:#e8c050;--rw:rgba(15,26,18,.7);--fg:rgba(26,46,31,.9)}
body{background:var(--bg);color:var(--text)}
h1{font-size:21px;color:var(--text);font-weight:600;letter-spacing:-.3px}
.sub{color:var(--text2);font-size:13px;margin:6px 0 20px}
.container{max-width:960px;margin:0 auto}
.rule-pool{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.rule-item{background:var(--card-bg);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--card-border);transition:all .2s;box-shadow:0 1px 3px var(--shadow)}
.rule-item:hover{box-shadow:0 2px 8px var(--shadow);transform:translateY(-1px)}
.rule-item .info{flex:1}
.rule-item .name{font-size:13px;color:var(--text);font-weight:500}
.rule-item .desc{font-size:11px;color:var(--text2);margin-top:2px}
.switch{position:relative;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;cursor:pointer;inset:0;background:var(--text3);border-radius:20px;transition:.25s}
.switch .slider::before{content:'';position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:var(--card-bg);border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.switch input:checked+.slider{background:var(--btn-bg)}
.switch input:checked+.slider::before{transform:translateX(16px)}
.switch input:disabled+.slider{opacity:.3;cursor:not-allowed}
textarea{width:100%;height:220px;background:var(--ta);color:var(--text);border:1px solid var(--tab);border-radius:10px;padding:14px 16px;font-size:14px;line-height:1.7;font-family:inherit;resize:vertical;transition:border-color .25s;box-shadow:inset 0 1px 3px var(--shadow)}
textarea:focus{outline:none;border-color:var(--btn-bg);box-shadow:inset 0 1px 3px var(--shadow),0 0 0 3px rgba(100,100,100,.1)}
textarea::placeholder{color:var(--text3)}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0}
.btn{background:var(--btn-bg);color:var(--card-bg);border:none;padding:9px 28px;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;font-weight:500;letter-spacing:-.1px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px var(--shadow-h)}
.btn:active{transform:translateY(0);box-shadow:0 1px 3px var(--shadow)}
.btn-sm{padding:7px 16px;font-size:12px}
.btn-ghost{background:transparent;border:1px solid var(--card-border);color:var(--text2)}
.btn-ghost:hover{background:var(--card-bg);border-color:var(--card-border);color:var(--text)}
.results{margin-top:24px}
.section{background:var(--sec);border-radius:10px;padding:16px 18px;margin-bottom:10px;border:1px solid var(--card-border);box-shadow:0 1px 3px var(--shadow)}
.section h3{font-size:13px;margin-bottom:10px;color:var(--text);display:flex;align-items:center;gap:6px;font-weight:600;letter-spacing:-.1px}
.pass{color:var(--success)}
.fail{color:var(--danger)}
.warn{color:var(--warn)}
.counter{font-size:12px;color:var(--text2);line-height:1.5}
.item{padding:5px 0;border-bottom:1px solid rgba(100,100,100,.06);font-size:12px;display:flex;gap:6px;align-items:baseline}
.item:last-child{border:0}
.line-num{color:var(--text3);font-size:11px;min-width:28px;font-variant-numeric:tabular-nums}
.ctx{color:var(--text2);word-break:break-all}
.unlock-bar{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;box-shadow:0 1px 3px var(--shadow);transition:all .2s}
.unlock-bar:hover{border-color:var(--card-border);box-shadow:0 2px 8px var(--shadow)}
.unlock-bar .left .title{font-size:14px;font-weight:600;cursor:pointer;color:var(--text);letter-spacing:-.1px}
.unlock-bar .left .hint{font-size:11px;color:var(--text2);margin-top:2px}
.unlock-bar .right{display:flex;gap:8px;align-items:center}
.unlock-bar input{background:var(--code);border:1px solid var(--card-border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:12px;width:130px;transition:all .2s}
.unlock-bar input:focus{outline:none;border-color:var(--btn-bg);box-shadow:0 0 0 3px rgba(100,100,100,.08)}
.unlock-bar .ubtn{color:var(--card-bg);border:none;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;font-weight:500}
.unlock-bar .ubtn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.unlock-bar .ubtn:active{transform:translateY(0)}
.footer{margin-top:24px;text-align:center;color:var(--text3);font-size:12px}
.priority{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-right:5px;font-weight:500}
.pri-free{background:var(--pfree);color:var(--pfreec)}
.pri-deep{background:var(--pdeep);color:var(--pdeepc)}
.pri-vip{background:var(--pvip);color:var(--pvipc)}
.admin-panel{background:var(--card-bg);border-radius:10px;padding:16px;margin-bottom:14px;display:none;border:1px solid var(--card-border);box-shadow:0 1px 3px var(--shadow)}
.admin-panel textarea{height:80px;font-size:11px;font-family:monospace}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fight-card{background:var(--fg);border:1px solid var(--card-border);border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:0 1px 2px var(--shadow)}
.fight-card h4{color:var(--text);font-size:13px;margin-bottom:10px;font-weight:600}
.fight-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fight-cell{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:8px 10px;font-size:12px}
.fight-cell .label{color:var(--text2);font-size:11px}
.fight-cell .val{color:var(--text);margin-top:2px;font-weight:500}
.fight-dir-bar{display:flex;gap:4px;align-items:end;height:28px;margin:10px 0}
.fight-dir-bar .bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;background:var(--text3);position:relative}
.fight-dir-bar .bar-label{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text2)}
.tip-box{background:var(--rw);border-left:3px solid var(--danger);border-radius:6px;padding:10px 12px;margin-top:10px;font-size:12px;color:var(--text);line-height:1.5}
.theme-picker{display:flex;gap:16px;flex-wrap:wrap;padding:12px 0 4px 0;align-items:center}
.theme-picker span{font-size:11px;color:var(--text2);margin-right:4px}
.theme-opt{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;flex-shrink:0}
.theme-opt:hover{transform:scale(1.2)}
.theme-opt.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--card-bg),0 0 0 4px var(--accent)}
.theme-opt .label{position:absolute;top:40px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text2);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.theme-opt:hover .label{opacity:1}
.t-minimal{background:linear-gradient(135deg,#f8f9fc,#eef1f8)}
.t-aurora{background:radial-gradient(ellipse at 50% 0,#1a1a3e,#0f0f23)}
.t-neon{background:#0a0a0f}
.t-warm{background:linear-gradient(135deg,#fef9f0,#fdf2e2)}
.t-forest{background:linear-gradient(135deg,#0f1a12,#1a2e1f)}
/* ===== 评分面板 ===== */
.score-section{background:var(--sec);border-radius:14px;padding:22px 24px;margin:16px 0;border:1px solid var(--card-border);box-shadow:0 2px 8px var(--shadow);display:none}
.score-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.score-header h2{font-size:18px;font-weight:700;letter-spacing:-.3px;margin:0}
.score-badge{display:flex;flex-direction:column;align-items:center;gap:2px}
.score-big{font-size:48px;font-weight:800;line-height:1;letter-spacing:-2px}
.score-grade{font-size:13px;padding:2px 14px;border-radius:20px;font-weight:600}
.grade-S{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f}
.grade-A{background:#4ade80;color:#052e16}
.grade-B{background:#60a5fa;color:#1e3a5f}
.grade-C{background:#fbbf24;color:#713f12}
.grade-D{background:#f87171;color:#450a0a}
.score-dims{margin:16px 0;display:flex;flex-direction:column;gap:10px}
.score-dim{display:flex;align-items:center;gap:10px}
.score-dim .label{width:80px;font-size:12px;color:var(--text2);flex-shrink:0;text-align:right;font-weight:500}
.score-dim .bar-wrap{flex:1;height:18px;background:var(--code);border-radius:9px;overflow:hidden;position:relative}
.score-dim .bar-fill{height:100%;border-radius:9px;transition:width .6s ease;position:relative}
.score-dim .bar-fill::after{content:attr(data-pct);position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:#fff}
.score-dim .val{width:30px;font-size:13px;font-weight:600;text-align:center;flex-shrink:0;color:var(--text)}
.score-toggle{display:flex;gap:6px}
.score-toggle button{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text2);cursor:pointer;transition:all .15s}
.score-toggle button.active{background:var(--pvip);color:var(--pvipc);border-color:var(--pvipc);font-weight:600}
.score-breakdown{margin-top:14px;background:var(--rw);border:1px solid var(--card-border);border-radius:10px;padding:14px 16px;display:none}
.score-breakdown.show{display:block}
.score-breakdown h4{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)}
.score-bd-item{padding:5px 0;font-size:12px;color:var(--text2);border-bottom:1px solid rgba(100,100,100,.06);display:flex;justify-content:space-between}
.score-bd-item:last-child{border:0}
.score-bd-item .bd-label{color:var(--text2)}
.score-bd-item .bd-val{font-weight:500}
.score-bd-item .bd-pass{color:var(--success)}
.score-bd-item .bd-warn{color:var(--warn)}
.score-bd-item .bd-fail{color:var(--danger)}
.score-actions{display:flex;gap:8px;margin-top:12px}
/* ===== 响应式：手机适配 ===== */
@media(max-width:640px){
  body{padding:14px}
  h1{font-size:18px}
  .sub{font-size:12px;margin:4px 0 14px}
  .container{padding:0}
  .unlock-bar{padding:10px 12px}
  .unlock-bar .left .title{font-size:13px}
  .unlock-bar .left .hint{font-size:10px}
  .unlock-bar .right{gap:6px;width:100%;margin-top:6px}
  .unlock-bar input{width:100%;flex:1;min-width:0;padding:8px 10px;font-size:13px;min-height:38px}
  .unlock-bar .ubtn{padding:8px 14px;font-size:12px;min-height:38px}
  .admin-grid{grid-template-columns:1fr}
  .rule-pool{grid-template-columns:1fr}
  .rule-item{padding:10px 12px}
  .rule-item .name{font-size:12px}
  .rule-item .desc{font-size:10px}
  textarea{height:160px;padding:12px 14px;font-size:15px}
  textarea::placeholder{font-size:13px}
  .toolbar{gap:6px}
  .toolbar .btn{flex:1;text-align:center;padding:11px 12px;font-size:14px;min-height:44px}
  .toolbar .btn-sm{padding:11px 12px;font-size:13px;min-height:44px}
  .section{padding:12px 14px}
  .section h3{font-size:12px}
  .item{font-size:11px}
  .counter{font-size:11px}
  .pri-free,.pri-deep,.pri-vip{font-size:9px;padding:1px 6px}
  .theme-picker{gap:10px;justify-content:center}
  .theme-opt{width:30px;height:30px}
  .score-section{padding:16px 14px;margin:12px 0}
  .score-header{flex-direction:column;align-items:flex-start;gap:6px}
  .score-header h2{font-size:16px}
  .score-toggle{width:100%}
  .score-toggle button{flex:1;text-align:center;padding:8px 10px;font-size:11px;min-height:38px}
  .score-big{font-size:38px}
  .score-grade{font-size:12px}
  .score-dim{gap:6px}
  .score-dim .label{width:55px;font-size:11px}
  .score-dim .bar-wrap{height:16px}
  .score-dim .bar-fill::after{font-size:9px;right:4px}
  .score-dim .val{width:24px;font-size:12px}
  .score-breakdown{padding:10px 12px}
  .score-bd-item{font-size:11px;flex-direction:column;gap:2px;padding:4px 0}
  .fight-card{padding:12px}
  .fight-card h4{font-size:12px}
  .fight-grid{grid-template-columns:1fr 1fr}
  .fight-cell{padding:6px 8px;font-size:11px}
  .fight-dir-bar{height:22px}
  .footer{font-size:11px;margin-top:16px}
}
@media(max-width:380px){
  body{padding:10px}
  h1{font-size:16px}
  .score-dim .label{width:45px;font-size:10px}
  .score-big{font-size:32px}
}
</style>
</head>
<body>
<div class="container">
<h1>✏️ 骡式写作自检工具</h1>
<p class="sub">选规则，贴正文，一键检查</p>

<div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-size:12px">
  <span style="font-size:16px">🔒</span>
  <span style="color:var(--text2)">所有文本在本地运行，不上传任何服务器。</span>
</div>

<div class="unlock-bar" id="barPro">
  <div class="left">
    <div class="title" id="tPro">🔒 高级版 ¥59</div>
    <div class="hint">追尾规则 · 替读者总结 · 对话评分 · 五感均衡 · 弱动词 · 视角一致性 · 后续规则持续更新</div>
  </div>
  <div class="right" id="aPro">
    <input type="text" id="iPro" placeholder="高级解锁码" onkeydown="if(event.key==='Enter')ul('pro')">
    <button class="ubtn" onclick="ul('pro')" style="background:var(--btn-bg)">解锁</button>
  </div>
</div>

<div class="unlock-bar" style="border-color:var(--pvipc);background:var(--card-bg)" id="bar终极版">
  <div class="left">
    <div class="title" style="color:var(--pvipc)" id="t终极版">🔥 终极版 ¥119</div>
    <div class="hint">每条违规附带改写指导 · 教你把30分拉到60分 · 含打戏文戏专项</div>
  </div>
  <div class="right" id="a终极版">
    <input type="text" id="i终极版" placeholder="终极版解锁码" onkeydown="if(event.key==='Enter')ul('vvip')">
    <button class="ubtn" onclick="ul('vvip')" style="background:#ea580c">解锁</button>
  </div>
</div>

<div class="unlock-bar" id="themeBar" style="display:none;border-color:var(--accent)">
  <div class="left">
    <div class="title" style="font-size:13px">🎨 主题</div>
    <div class="hint">付费用户专属，选你喜欢的背景</div>
  </div>
  <div class="right">
    <div class="theme-picker" id="themePicker">
      <span>选择背景：</span>
      <div class="theme-opt t-minimal" data-theme="minimal" onclick="setTheme('minimal')"><div class="label">极简</div></div>
      <div class="theme-opt t-aurora" data-theme="aurora" onclick="setTheme('aurora')"><div class="label">极光</div></div>
      <div class="theme-opt t-neon" data-theme="neon" onclick="setTheme('neon')"><div class="label">赛博</div></div>
      <div class="theme-opt t-warm" data-theme="warm" onclick="setTheme('warm')"><div class="label">暖阳</div></div>
      <div class="theme-opt t-forest" data-theme="forest" onclick="setTheme('forest')"><div class="label">墨绿</div></div>
    </div>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="color:var(--danger);font-size:13px">⚙ 管理员</span>
    <button class="btn btn-sm btn-ghost" onclick="ta()" style="font-size:12px">收起</button>
  </div>
  <div class="admin-grid">
    <div><div style="font-size:12px;color:#a78bfa;margin-bottom:4px">🔑 高级版码（¥59）</div><textarea id="cPro" placeholder="每行一个码"></textarea></div>
    <div><div style="font-size:12px;color:var(--pvipc);margin-bottom:4px">🔥 终极版码（¥119）</div><textarea id="c终极版" placeholder="每行一个码"></textarea></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="btn btn-sm" onclick="uc()" style="background:var(--btn-bg);font-size:12px">更新</button>
    <button class="btn btn-sm btn-ghost" onclick="es()" style="font-size:12px">统计</button>
  </div>
  <div id="adminMsg" style="font-size:12px;color:#888;margin-top:6px"></div>
</div>

<textarea id="input" placeholder="在此粘贴你的小说正文……"></textarea>

const CS_CHARS='abcdefghijkmnpqrstuvwxyz23456789';
function cs(s){
  // 计算8位码前7位的校验和（格式: XXXX-XXXC，跳过中间的-）
  const ch=s.replace('-',''); // 去掉横杠，得到8个字符
  let sum=0;
  for(let i=0;i<7;i++)sum+=ch.charCodeAt(i);
  return CS_CHARS[sum%31];
}
function verifyCs(code){
  const ch=code.replace('-','');
  if(ch.length!==8)return true; // 旧格式跳过
  return ch[7]===cs(code);
}

  const f300=text.substring(0,300);const hc=/打|杀|追|逃|死|血|枪|刀|跑|冲|撞|摔|砸|吼|叫|危险|完了|不好/.test(f300);

// ========================================================================
// 📊 写作评分引擎（终极版专属）
// ========================================================================

const DIMS = [
  {id:'opening',     n:'开篇冲击力', w:0.15, desc:'故事开场是否第一时间抓住读者'},
  {id:'clean',       n:'语言纯净度', w:0.15, desc:'破折号/AI词/感叹号/弱确定词等污染控制'},
  {id:'pace',        n:'节奏控制力', w:0.10, desc:'段落节奏、过渡词控制、慢速词使用'},
  {id:'senses',      n:'五感沉浸度', w:0.15, desc:'视觉/听觉/触觉/嗅觉/味觉覆盖广度'},
  {id:'action',      n:'动作质量',   w:0.15, desc:'打戏传导链完整度、动作动词密度、方向词'},
  {id:'density',     n:'信息密度',   w:0.12, desc:'不替读者总结、不追尾、不啰嗦'},
  {id:'vocab',       n:'词汇健康度', w:0.08, desc:'用字重复率、的地得正确、的密度控制'},
  {id:'visual',      n:'画面感',     w:0.10, desc:'方向词丰富度、具象动词占比、场景可视性'},
];

// 各维度阈值: {new: [优秀分, 良好分, 及格分, 阈值参数...], old: [...]}
// 返回0-10分
function scoreOpening(text, mode) {
  const isOld = mode === 'old';
  const f100 = text.substring(0,100), f300 = text.substring(0,300);
  const conflictRE = /打|杀|追|逃|死|血|枪|刀|跑|冲|撞|摔|砸|吼|叫|危险|完了|不好|跑|跳|跌|抓|扑|拉|扯|推|踢|掐|捏|撕|举|握|拔|掏|闪|躲|翻|滚/i;
  const eventRE = /忽然|突然|就在这时|猛地|瞬间|轰|崩|碎|裂|爆|断/;
  const c300 = (f300.match(conflictRE)||[]).length;
  const c100 = (f100.match(conflictRE)||[]).length;
  const hasEvent = eventRE.test(f100);
  const hasAction = f100.length > 20 && /\S{2,}/.test(f100);
  if(isOld){
    if(c100 >= 3 && hasEvent) return 10;
    if(c100 >= 2) return 8;
    if(c300 >= 3) return 6;
    if(c300 >= 1) return 4;
    return hasAction ? 3 : 1;
  }
  // new reader
  if(c300 >= 3) return 10;
  if(c300 >= 1) return 8;
  if(c300 >= 0 && hasAction) return 5;
  return 3;
}

function scoreClean(text, lines, mode) {
  const isOld = mode === 'old';
  let deduct = 0;
  // 破折号
  const dashes = (text.match(/——/g)||[]).length;
  if(isOld){ if(dashes>0) deduct+=99; }
  else deduct += dashes * 2;
  // 感叹号堆叠
  const exc = (text.match(/!!|\?\?|！{2,}|？{2,}/g)||[]).length;
  deduct += exc * (isOld ? 3 : 1.5);
  // AI词
  const aiWords = ['值得注意的是','不可否认的是','显而易见','众所周知','毋庸置疑','总的来说','与此同时','需要指出的是'];
  let aiCount=0; aiWords.forEach(w=>{let x=0;while((x=text.indexOf(w,x))!==-1){aiCount++;x+=w.length}});
  deduct += aiCount * (isOld ? 3 : 1.5);
  // 弱确定词
  const weak = /似乎|好像|仿佛/g;
  const wk = (text.match(weak)||[]).length;
  deduct += wk * (isOld ? 2 : 1);
  // AI过渡词(额外)
  const aiExtra = /从某种角度来看|换言之|不可忽略的是/;
  const ae = (text.match(aiExtra)||[]).length;
  deduct += ae * (isOld ? 3 : 1.5);
  // 慢速副词(仅供参考，少扣)
  const slow = /慢慢|缓缓|渐渐/g;
  const sl = (text.match(slow)||[]).length;
  deduct += sl * (isOld ? 1.5 : 0.5);

  let score = Math.max(0, 10 - deduct);
  if(isOld && dashes>0) score = 0;
  return Math.round(score * 10) / 10;
}

function scorePace(text, mode) {
  const isOld = mode === 'old';
  const pars = text.split(/\n\s*\n/).filter(p=>p.trim().length>0);
  let longPar=0; pars.forEach(p=>{const h=(p.match(/[一-鿿]/g)||[]).length; if(h>300)longPar++});
  const longRatio = pars.length>0 ? longPar/pars.length : 0;
  // 过渡词
  const trans = /然后|接着|于是/g;
  const tc = (text.match(trans)||[]).length;
  // 追尾
  const lines2 = text.split('\n');
  let tailC=0,ps=[];
  lines2.forEach((l,i)=>{const t=l.trim();if(t.length<3)return;const s=t.substring(0,3);
    if(i>0&&ps.length&&ps[ps.length-1]===s)tailC++;ps.push(s);if(ps.length>5)ps.shift()});

  if(isOld){
    if(longRatio===0 && tc===0 && tailC===0) return 10;
    let d = 0;
    if(longRatio>0.1) d += 3;
    if(tc>0) d += Math.min(tc*1.5,4);
    if(tailC>0) d += Math.min(tailC*2,4);
    return Math.max(1, 10-d);
  }
  // new
  if(longRatio<0.15 && tc<=2 && tailC<=1) return 10;
  if(longRatio<0.3 && tc<=4 && tailC<=3) return 8;
  if(longRatio<0.5 && tc<=8 && tailC<=5) return 6;
  if(longRatio<0.7 && tc<=12) return 4;
  return 2;
}

function scoreSenses(text, mode) {
  const isOld = mode === 'old';
  const h = {
    visual: /看到|看见|视线|目光|视野|暗|亮|光|颜色|黑|白|红|灰|蓝|景|影|形|轮廓/.test(text),
    audio: /听到|听见|脚步|轰鸣|响|安静|声|音|吼|啸|呼/.test(text),
    smell: /闻到|气味|香|臭|腥|柴油|机油|铁腥|硝烟|灰|霉|锈/.test(text),
    touch: /凉|冷|温|热|刺痛|麻|疼|烫|寒|冰|暖/.test(text),
    taste: /苦|甜|咸|辣|酸|涩|舌尖|滋味/.test(text),
  };
  const count = [h.visual, h.audio, h.smell, h.touch, h.taste].filter(Boolean).length;
  if(isOld){
    if(count>=4) return 10;
    if(count>=3) return 7;
    if(count>=2) return 4;
    return 1;
  }
  if(count>=3) return 10;
  if(count>=2) return 7;
  if(count>=1) return 4;
  return 1;
}

function scoreAction(text, lines, mode) {
  const isOld = mode === 'old';
  const avs=['打','踢','抓','扯','拉','推','撞','压','砸','切','刺','劈','砍','捅','戳','抽','挥','甩','抡','格','挡','闪','躲','跳','翻','滚','扑','跨','蹲','蹿','蹬','旋','冲','跌','摔','撑','拽','抠','掰','锁','勒','掐','撕','顶','爬','滑','端','举','握','收','探'];
  const sts=text.split(/[。！？\n]/).filter(s=>s.trim().length>3);
  let wk=0; sts.forEach(s=>{const v=avs.filter(a=>s.includes(a)).length;if(v<2)wk++});
  const richRate = sts.length>0 ? Math.round((1-wk/sts.length)*100) : 0;
  const chain = {
    power: /肩|肘|腕|膝|腰|胯|踝|掌|拳|指|脚|腿/.test(text),
    contact: /击中|撞|碰|擦|贴|挨|咬|砸/.test(text),
    target: /肋|腹|胸|背|颈|喉|面|额|眉|腿|膝|踝/.test(text),
    reaction: /后退|踉跄|倒下|弯腰|缩|仰|扑倒|闷哼|吼|叫/.test(text),
  };
  const chainCount = Object.values(chain).filter(Boolean).length;
  const dm={'左':0,'右':0,'前':0,'后':0,'上':0,'下':0};let td=0;
  lines.forEach(l=>{Object.keys(dm).forEach(d=>{let x=0;while((x=l.indexOf(d,x))!==-1){dm[d]++;td++;x++}})});

  if(isOld){
    if(chainCount>=4 && richRate>=35 && td>=20 && dm['左']>0 && dm['右']>0) return 10;
    if(chainCount>=4 && richRate>=25 && td>=15) return 8;
    if(chainCount>=3 && richRate>=15 && td>=10) return 6;
    if(chainCount>=2 && richRate>=10) return 4;
    return 1;
  }
  if(chainCount>=4 && richRate>=20 && td>=10) return 10;
  if(chainCount>=3 && richRate>=15 && td>=8) return 8;
  if(chainCount>=3 && richRate>=10) return 6;
  if(chainCount>=2) return 4;
  return 1;
}

function scoreDensity(text, lines, mode) {
  const isOld = mode === 'old';
  const summaryPs = ['他意识到','她意识到','他明白了','这意味着','这说明','那个动作的意思是','沈森听懂了','沈森意识到','她明白了','她意识到'];
  let sCount=0; lines.forEach(l=>{summaryPs.forEach(w=>{let x=0;while((x=l.indexOf(w,x))!==-1){sCount++;x+=w.length}})});
  // 追尾
  let tailC=0,ps=[];
  lines.forEach((l,i)=>{const t=l.trim();if(t.length<3)return;const s=t.substring(0,3);if(i>0&&ps.length&&ps[ps.length-1]===s)tailC++;ps.push(s);if(ps.length>5)ps.shift()});
  // "然后"类
  const thenC = (text.match(/然后|接着|于是/g)||[]).length;
  // "就是"等废话填充
  const filler = /说白了|换句话|简单来说|众所周知/g;
  const fC = (text.match(filler)||[]).length;

  if(isOld){
    let d=0;
    d += Math.min(sCount*2, 5);
    d += Math.min(tailC*2, 4);
    d += Math.min(thenC*1.5, 3);
    d += fC*2;
    return Math.max(0, 10-d);
  }
  let d=0;
  d += Math.min(sCount*1.5, 4);
  d += Math.min(tailC*1.5, 3);
  d += Math.min(thenC*1, 2);
  d += fC*1.5;
  return Math.max(1, 10-d);
}

function scoreVocab(text, mode) {
  const isOld = mode === 'old';
  const han = text.match(/[一-鿿]/g) || [];
  // 重复字
  let rr=[];
  for(let i=0;i<han.length-50;i++){const sl=han.slice(i,i+50),f={};sl.forEach(c=>{f[c]=(f[c]||0)+1});Object.keys(f).forEach(c=>{if(f[c]>=3&&!rr.some(x=>x.c===c&&Math.abs(x.i-i)<30))rr.push({c,count:f[c],i})})};
  const rCount = rr.length;
  // 的地得
  const ddd = (text.match(/(的)[的地得]/g)||[]).length;
  // 的密度: 含4个以上"的"的句子数
  let deSen=0; text.split(/[。！？\n]/).forEach(s=>{if((s.match(/的/g)||[]).length>=4)deSen++});
  // 句子平均长
  const sens = text.split(/[。！？\n]/).filter(s=>s.trim().length>5);
  const avgLen = sens.length>0 ? Math.round(han.length/sens.length) : 0;

  if(isOld){
    let d=0;
    if(rCount>15) d += 3; else if(rCount>8) d += 1.5;
    if(ddd>2) d += 2; else if(ddd>0) d += 1;
    if(deSen>3) d += 2.5; else if(deSen>1) d += 1;
    if(avgLen>35) d += 2; else if(avgLen>25) d += 1;
    return Math.max(1, 10-d);
  }
  let d=0;
  if(rCount>30) d += 3; else if(rCount>15) d += 1.5;
  if(ddd>5) d += 2; else if(ddd>2) d += 1;
  if(deSen>5) d += 2; else if(deSen>3) d += 1;
  if(avgLen>40) d += 1.5; else if(avgLen>30) d += 0.5;
  return Math.max(2, 10-d);
}

function scoreVisual(text, lines, mode) {
  const isOld = mode === 'old';
  const dm={'左':0,'右':0,'前':0,'后':0,'上':0,'下':0};let td=0;
  lines.forEach(l=>{Object.keys(dm).forEach(d=>{let x=0;while((x=l.indexOf(d,x))!==-1){dm[d]++;td++;x++}})});
  const dirCount = Object.values(dm).filter(v=>v>0).length;
  // 具象动词（比avs更宽）
  const concreteVerbs = /握|举|抬|放|抓|拉|推|踢|踩|跨|蹲|站|坐|跪|趴|躺|靠|扶|撑|抵|贴|伸|缩|转|扭|仰|低|侧|弓|绷|绷/g;
  const cvCount = (text.match(concreteVerbs)||[]).length;
  const totalSentences = text.split(/[。！？\n]/).filter(s=>s.trim().length>3).length;
  const cvRate = totalSentences>0 ? Math.round(cvCount/totalSentences*100) : 0;
  // 色彩/光线词
  const lightWords = /黑|白|红|灰|蓝|暗|亮|光|影|色/g;
  const lwCount = (text.match(lightWords)||[]).length;

  if(isOld){
    let d=0;
    if(td<15) d+=3; else if(td<10) d+=5;
    if(dirCount<4) d+=2;
    if(cvRate<40) d+=2; else if(cvRate<25) d+=4;
    if(lwCount<3) d+=2;
    return Math.max(1, 10-d);
  }
  let d=0;
  if(td<10) d+=3; else if(td<5) d+=5;
  if(dirCount<3) d+=2;
  if(cvRate<30) d+=2; else if(cvRate<20) d+=4;
  if(lwCount<2) d+=2;
  return Math.max(2, 10-d);
}

// 综合评分
function computeScore(mode, text, lines){
  const s = [
    scoreOpening(text, mode),
    scoreClean(text, lines, mode),
    scorePace(text, mode),
    scoreSenses(text, mode),
    scoreAction(text, lines, mode),
    scoreDensity(text, lines, mode),
    scoreVocab(text, mode),
    scoreVisual(text, lines, mode),
  ];
  const total = Math.round(DIMS.reduce((a, dim, i) => a + s[i] * dim.w * 10, 0));
  return {scores: s, total};
}

function getGrade(score, mode){
  if(mode==='old'){
    if(score>=90) return {g:'S',l:'殿堂级',c:'grade-S'};
    if(score>=78) return {g:'A',l:'优秀',c:'grade-A'};
    if(score>=65) return {g:'B',l:'良好',c:'grade-B'};
    if(score>=50) return {g:'C',l:'及格',c:'grade-C'};
    return {g:'D',l:'需打磨',c:'grade-D'};
  }
  if(score>=90) return {g:'S',l:'殿堂级',c:'grade-S'};
  if(score>=75) return {g:'A',l:'优秀',c:'grade-A'};
  if(score>=60) return {g:'B',l:'良好',c:'grade-B'};
  if(score>=45) return {g:'C',l:'及格',c:'grade-C'};
  return {g:'D',l:'需打磨',c:'grade-D'};
}

let currentMode = 'new';
let lastScore = null;

function showScorePanel(){
  const text = document.getElementById('input').value;
  if(!text.trim()) return alert('请先粘贴正文');
  if(!vu) return alert('🔒 评分功能仅限终极版用户使用');
  const lines = text.split('\n');
  const result = computeScore(currentMode, text, lines);
  lastScore = result;
  renderScore(currentMode, result);
  document.getElementById('scoreSection').style.display='block';
  document.getElementById('scoreSection').scrollIntoView({behavior:'smooth',block:'center'});
}

function switchScore(mode){
  currentMode = mode;
  document.querySelectorAll('#scoreToggle button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  if(lastScore){
    const text = document.getElementById('input').value;
    const lines = text.split('\n');
    const result = computeScore(mode, text, lines);
    lastScore = result;
    renderScore(mode, result);
  }
}

function renderScore(mode, result){
  const {scores, total} = result;
  const grade = getGrade(total, mode);
  // Big score
  document.getElementById('scoreBig').textContent = total;
  document.getElementById('scoreGradeLabel').textContent = grade.g+' — '+grade.l;

  // Dimension bars
  const colors = ['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#06b6d4','#84cc16','#ec4899'];
  let html='';
  const scoreDesc = {
    'opening':['开场平缓，缺少冲突信号','有少量冲突元素','开篇有力，能抓住读者','前三行就引爆冲突'],
    'clean':['多处语言污染','基础可读，有几处瑕疵','语言干净，无明显污染','极致纯净，零污染'],
    'pace':['节奏拖沓，段落过长','节奏较平，可适当拆分','节奏控制良好','节奏精准，张弛有度'],
    'senses':['只有1-2种感官','3种感官，基础覆盖','4种感官，较沉浸','五感全开，身临其境'],
    'action':['动作稀疏，传导链不完整','动作描写基本可用','动作质量好，传导链完整','打戏行云流水'],
    'density':['信息冗余明显','偶尔替读者总结','信息密度控制良好','字字有用，绝不废话'],
    'vocab':['重复字多，用词单调','词汇基本健康','词汇丰富，用字精炼','字词功力扎实'],
    'visual':['画面感弱，缺乏方向指引','画面感一般','场景清晰可想象','画面历历在目'],
  };

  DIMS.forEach((dim,i)=>{
    const s = scores[i];
    const pct = Math.round(s * 10);
    const barPct = Math.max(5, pct);
    const color = colors[i];
    const descs = scoreDesc[dim.id];
    const sd = s>=9 ? descs[3] : s>=7 ? descs[2] : s>=4 ? descs[1] : descs[0];
    html += `<div class="score-dim">
      <div class="label">${dim.n}</div>
      <div class="bar-wrap">
        <div class="bar-fill" data-pct="${pct}%" style="width:${barPct}%;background:${color}"></div>
      </div>
      <div class="val">${s.toFixed(1)}</div>
    </div>`;
  });
  document.getElementById('scoreDims').innerHTML = html;

  // Breakdown
  renderBreakdown(mode, result);
}

function renderBreakdown(mode, result){
  let txt = '';
  const text = document.getElementById('input').value;
  const lines = text.split('\n');

  // Each dimension's raw data
  const f100 = text.substring(0,100), f300 = text.substring(0,300);
  const c100 = (f100.match(/打|杀|追|逃|死|血|枪|刀|跑|冲|撞|摔|砸|吼|叫|危险|完了|不好/i)||[]).length;
  const c300 = (f300.match(/打|杀|追|逃|死|血|枪|刀|跑|冲|撞|摔|砸|吼|叫|危险|完了|不好/i)||[]).length;
  txt += `<div class="score-bd-item"><span class="bd-label">📌 开篇冲击</span><span>前100字冲突词${c100}个 · 前300字${c300}个 · 得分${result.scores[0].toFixed(1)}/10</span></div>`;

  const dashes = (text.match(/——/g)||[]).length;
  const exc = (text.match(/!!|\?\?|！{2,}|？{2,}/g)||[]).length;
  const wk = (text.match(/似乎|好像|仿佛/g)||[]).length;
  txt += `<div class="score-bd-item"><span class="bd-label">📌 语言纯净</span><span>破折号${dashes}处 · 感叹号堆${exc}处 · 弱词${wk}处 · 得分${result.scores[1].toFixed(1)}/10</span></div>`;

  const pars = text.split(/\n\s*\n/).filter(p=>p.trim().length>0);
  let lp=0; pars.forEach(p=>{const h=(p.match(/[一-鿿]/g)||[]).length; if(h>300)lp++});
  const trans = (text.match(/然后|接着|于是/g)||[]).length;
  txt += `<div class="score-bd-item"><span class="bd-label">📌 节奏控制</span><span>超长段${lp}/${pars.length} · 过渡词${trans}处 · 得分${result.scores[2].toFixed(1)}/10</span></div>`;

  const senses={
    v:/看到|看见|视线|目光|视野|暗|亮|光|颜色|黑|白|红|灰|蓝|景|影|形|轮廓/.test(text),
    a:/听到|听见|脚步|轰鸣|响|安静|声|音|吼|啸/.test(text),
    s:/闻到|气味|香|臭|腥|柴油|机油|铁腥|硝烟|灰|霉/.test(text),
    t:/凉|冷|温|热|刺痛|麻|疼|烫|寒|冰|暖/.test(text),
    ta:/苦|甜|咸|辣|酸|涩|舌尖|滋味/.test(text),
  };
  const sc = [senses.v,senses.a,senses.s,senses.t,senses.ta].filter(Boolean).length;
  const snames = ['视觉','听觉','嗅觉','触觉','味觉'];
  const active = snames.filter((n,i)=>[senses.v,senses.a,senses.s,senses.t,senses.ta][i]).join('、');
  txt += `<div class="score-bd-item"><span class="bd-label">📌 五感沉浸</span><span>覆盖${sc}/5感（${active}） · 得分${result.scores[3].toFixed(1)}/10</span></div>`;

  const avs = ['打','踢','抓','扯','拉','推','撞','压','砸','切','刺','劈','砍','捅','戳','抽','挥','甩','抡','格','挡','闪','躲','跳','翻','滚','扑','跨','蹲','蹿','蹬','旋','冲','跌','摔','撑','拽','抠','掰','锁','勒','掐','撕','顶'];
  const sts = text.split(/[。！？\n]/).filter(s=>s.trim().length>3);
  let wk2=0; sts.forEach(s=>{const v=avs.filter(a=>s.includes(a)).length;if(v<2)wk2++});
  const rich = sts.length>0 ? Math.round((1-wk2/sts.length)*100) : 0;
  txt += `<div class="score-bd-item"><span class="bd-label">📌 动作质量</span><span>动作富集${rich}% · 方向词${(text.match(/左|右|前|后|上|下/g)||[]).length}个 · 得分${result.scores[4].toFixed(1)}/10</span></div>`;

  const summaryPs = ['他意识到','她意识到','他明白了','这意味着','这说明','那个动作的意思是'];
  let sc2=0; lines.forEach(l=>{summaryPs.forEach(w=>{let x=0;while((x=l.indexOf(w,x))!==-1){sc2++;x+=w.length}})});
  let tailC2=0,ps2=[]; lines.forEach((l,i)=>{const t=l.trim();if(t.length<3)return;const s=t.substring(0,3);if(i>0&&ps2.length&&ps2[ps2.length-1]===s)tailC2++;ps2.push(s);if(ps2.length>5)ps2.shift()});
  txt += `<div class="score-bd-item"><span class="bd-label">📌 信息密度</span><span>替读者总结${sc2}处 · 追尾${tailC2}处 · 得分${result.scores[5].toFixed(1)}/10</span></div>`;

  const han = text.match(/[一-鿿]/g)||[];
  let rr2=[];
  for(let i=0;i<han.length-50;i++){const sl=han.slice(i,i+50),f={};sl.forEach(c=>{f[c]=(f[c]||0)+1});Object.keys(f).forEach(c=>{if(f[c]>=3&&!rr2.some(x=>x.c===c&&Math.abs(x.i-i)<30))rr2.push({c,count:f[c],i})})};
  txt += `<div class="score-bd-item"><span class="bd-label">📌 词汇健康</span><span>重复字类型${rr2.length}种 · 的地得${(text.match(/(的)[的地得]/g)||[]).length}处 · 得分${result.scores[6].toFixed(1)}/10</span></div>`;

  const dm={'左':0,'右':0,'前':0,'后':0,'上':0,'下':0};let td=0;
  lines.forEach(l=>{Object.keys(dm).forEach(d=>{let x=0;while((x=l.indexOf(d,x))!==-1){dm[d]++;td++;x++}})});
  const dirStr = Object.entries(dm).filter(([k,v])=>v>0).map(([k,v])=>k+':'+v).join(' ');
  txt += `<div class="score-bd-item"><span class="bd-label">📌 画面感</span><span>方向词${td}个（${dirStr}） · 得分${result.scores[7].toFixed(1)}/10</span></div>`;

  // 总分汇总
  const grade = getGrade(result.total, mode);
  txt += `<div class="score-bd-item" style="border-top:1px solid var(--card-border);padding-top:10px;margin-top:6px;font-weight:600"><span class="bd-label">总分</span><span>${result.total}分 · ${grade.g}级 · ${grade.l}</span></div>`;

  document.getElementById('scoreBdContent').innerHTML = txt;
}

function toggleBreakdown(){
  const el = document.getElementById('scoreBreakdown');
  el.classList.toggle('show');
}
</script>
</body>
</html>
