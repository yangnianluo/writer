<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>骡式写作自检工具 · 免费版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,'Microsoft YaHei',-apple-system,sans-serif;background:linear-gradient(135deg,#f8f9fc 0%,#eef1f8 100%);color:#1d1d1f;padding:28px;min-height:100vh}
h1{font-size:21px;color:#1d1d1f;font-weight:600;letter-spacing:-.3px}
.sub{color:#8e8e98;font-size:13px;margin:6px 0 20px}
.container{max-width:960px;margin:0 auto}
.rule-pool{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.rule-item{background:#fff;border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border:1px solid #edf0f5;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.rule-item:hover{border-color:#d4d9e3;box-shadow:0 2px 8px rgba(0,0,0,.06);transform:translateY(-1px)}
.rule-item .info{flex:1}
.rule-item .name{font-size:13px;color:#1d1d1f;font-weight:500}
.rule-item .desc{font-size:11px;color:#8e8e98;margin-top:2px}
.switch{position:relative;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;cursor:pointer;inset:0;background:#d4d9e3;border-radius:20px;transition:.25s}
.switch .slider::before{content:'';position:absolute;height:16px;width:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.switch input:checked+.slider{background:#1d1d1f}
.switch input:checked+.slider::before{transform:translateX(16px)}
textarea{width:100%;height:240px;background:#fff;color:#1d1d1f;border:1px solid #e4e8ee;border-radius:10px;padding:14px 16px;font-size:14px;line-height:1.7;font-family:inherit;resize:vertical;transition:border-color .25s;box-shadow:inset 0 1px 3px rgba(0,0,0,.04)}
textarea:focus{outline:none;border-color:#1d1d1f;box-shadow:inset 0 1px 3px rgba(0,0,0,.04),0 0 0 3px rgba(0,0,0,.06)}
textarea::placeholder{color:#b8bcc6}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0}
.btn{background:#1d1d1f;color:#fff;border:none;padding:9px 28px;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;font-weight:500;letter-spacing:-.1px}
.btn:hover{background:#2d2d2f;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.btn-sm{padding:7px 16px;font-size:12px}
.btn-ghost{background:transparent;border:1px solid #e4e8ee;color:#8e8e98}
.btn-ghost:hover{background:#fff;border-color:#d4d9e3;color:#1d1d1f}
.results{margin-top:24px}
.section{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:10px;border:1px solid #edf0f5;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.section h3{font-size:13px;margin-bottom:10px;color:#1d1d1f;display:flex;align-items:center;gap:6px;font-weight:600;letter-spacing:-.1px}
.pass{color:#30d158}
.fail{color:#ff453a}
.warn{color:#ff9f0a}
.counter{font-size:12px;color:#8e8e98;line-height:1.5}
.item{padding:5px 0;border-bottom:1px solid #f4f5f8;font-size:12px;display:flex;gap:6px;align-items:baseline}
.item:last-child{border:0}
.line-num{color:#c7c7cc;font-size:11px;min-width:28px;font-variant-numeric:tabular-nums}
.ctx{color:#8e8e98;word-break:break-all}
.upgrade-bar{background:#fff;border:1px solid #edf0f5;border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s}
.upgrade-bar:hover{border-color:#d4d9e3;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.upgrade-bar .left .title{font-size:14px;color:#6d28d9;font-weight:600;letter-spacing:-.1px}
.upgrade-bar .left .hint{font-size:11px;color:#8e8e98;margin-top:2px}
.upgrade-bar .right{flex-shrink:0}
.upgrade-bar .ubtn{background:#6d28d9;color:#fff;border:none;padding:7px 20px;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s;font-weight:500}
.upgrade-bar .ubtn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(109,40,217,.3)}
.footer{margin-top:24px;text-align:center;color:#b8bcc6;font-size:12px}
.priority{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-right:4px;font-weight:500}
.pri-free{background:#f1f2f6;color:#6e6e78}
.pri-deep{background:#f0ecfa;color:#6d28d9}
.pri-vip{background:#fef1e8;color:#c2410c}
.rule-item.locked{opacity:.65;background:#fafafe;cursor:default}
.rule-item.locked:hover{border-color:#edf0f5;transform:none;box-shadow:0 1px 3px rgba(0,0,0,.04)}
/* ===== 评分面板 ===== */
.score-section{background:#fff;border-radius:14px;padding:22px 24px;margin:16px 0;border:1px solid #edf0f5;box-shadow:0 2px 8px rgba(0,0,0,.04);display:none}
.score-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.score-header h2{font-size:18px;font-weight:700;letter-spacing:-.3px;margin:0}
.score-badge{display:flex;flex-direction:column;align-items:center;gap:2px}
.score-big{font-size:48px;font-weight:800;line-height:1;letter-spacing:-2px}
.score-grade{font-size:13px;padding:2px 14px;border-radius:20px;font-weight:600}
.grade-S{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f}
.grade-A{background:#4ade80;color:#052e16}
.grade-B{background:#60a5fa;color:#1e3a5f}
.grade-C{background:#fbbf24;color:#713f12}
.grade-D{background:#f87171;color:#450a0a}
.score-dims{margin:16px 0;display:flex;flex-direction:column;gap:10px}
.score-dim{display:flex;align-items:center;gap:10px}
.score-dim .label{width:80px;font-size:12px;color:#8e8e98;flex-shrink:0;text-align:right;font-weight:500}
.score-dim .bar-wrap{flex:1;height:18px;background:#f5f6f9;border-radius:9px;overflow:hidden;position:relative}
.score-dim .bar-fill{height:100%;border-radius:9px;transition:width .6s ease;position:relative}
.score-dim .bar-fill::after{content:attr(data-pct);position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:#fff}
.score-dim .val{width:30px;font-size:13px;font-weight:600;text-align:center;flex-shrink:0;color:#1d1d1f}
.score-toggle{display:flex;gap:6px}
.score-toggle button{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #e4e8ee;background:#fff;color:#8e8e98;cursor:pointer;transition:all .15s}
.score-toggle button.active{background:#f0ecfa;color:#6d28d9;border-color:#e8e2f8;font-weight:600}
.score-breakdown{margin-top:14px;background:#f8f9fc;border:1px solid #edf0f5;border-radius:10px;padding:14px 16px;display:none}
.score-breakdown.show{display:block}
.score-breakdown h4{font-size:13px;font-weight:600;margin-bottom:8px;color:#1d1d1f}
.score-bd-item{padding:5px 0;font-size:12px;color:#8e8e98;border-bottom:1px solid rgba(100,100,100,.06);display:flex;justify-content:space-between}
.score-bd-item:last-child{border:0}
.score-upgrade-banner{background:#f8f6ff;border:1px solid #e8e2f8;border-radius:10px;padding:14px 18px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.score-upgrade-banner .txt{font-size:13px;color:#6d28d9;font-weight:500}
.score-upgrade-banner .btn-up{background:#6d28d9;color:#fff;border:none;padding:7px 20px;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s;font-weight:500}
.score-upgrade-banner .btn-up:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(109,40,217,.3)}
.score-free-limit{font-size:12px;color:#c2410c;text-align:center;margin-top:8px}
/* ===== 响应式：手机适配 ===== */
@media(max-width:640px){
  body{padding:14px}
  h1{font-size:18px}
  .sub{font-size:12px;margin-bottom:14px}
  .rule-pool{grid-template-columns:1fr}
  .rule-item{padding:10px 12px}
  .rule-item .name{font-size:12px}
  .rule-item .desc{font-size:10px}
  textarea{height:180px;padding:12px 14px;font-size:15px}
  textarea::placeholder{font-size:13px}
  .toolbar{gap:6px;margin:10px 0}
  .toolbar .btn{flex:1;text-align:center;padding:11px 12px;font-size:14px;min-height:44px}
  .toolbar .btn-sm{flex:0;padding:11px 14px;font-size:13px;min-height:44px}
  .toolbar span{width:100%;text-align:center;margin:6px 0 0 !important}
  .section{padding:12px 14px}
  .section h3{font-size:12px}
  .item{font-size:11px}
  .counter{font-size:11px}
  .upgrade-bar{padding:12px 14px}
  .upgrade-bar .left .title{font-size:13px}
  .upgrade-bar .left .hint{font-size:10px}
  .upgrade-bar .ubtn{padding:9px 18px;font-size:13px;min-height:40px}
  .score-section{padding:16px 14px;margin:12px 0}
  .score-header{flex-direction:column;align-items:flex-start;gap:6px}
  .score-header h2{font-size:16px}
  .score-toggle{width:100%}
  .score-toggle button{flex:1;text-align:center;padding:8px 10px;font-size:11px;min-height:38px}
  .score-badge{align-items:center}
  .score-big{font-size:38px}
  .score-grade{font-size:12px}
  .score-dim{gap:6px}
  .score-dim .label{width:55px;font-size:11px}
  .score-dim .bar-wrap{height:16px}
  .score-dim .bar-fill::after{font-size:9px;right:4px}
  .score-dim .val{width:24px;font-size:12px}
  .score-breakdown{padding:10px 12px}
  .score-bd-item{font-size:11px;flex-direction:column;gap:2px;padding:4px 0}
  .score-upgrade-banner{padding:12px 14px;flex-direction:column;text-align:center}
  .score-upgrade-banner .txt{font-size:12px}
  .score-upgrade-banner .btn-up{padding:9px 24px;font-size:13px;min-height:40px}
  .score-free-limit{font-size:11px}
  .privacy-badge{padding:10px 12px;font-size:13px}
  .privacy-badge span{font-size:16px}
  .footer{font-size:11px;margin-top:18px}
}
@media(max-width:380px){
  body{padding:10px}
  h1{font-size:16px}
  .score-dim .label{width:45px;font-size:10px}
  .score-big{font-size:32px}
}
@media(min-width:641px){
  .rule-pool{grid-template-columns:1fr 1fr}
}
</head>
<body>
<div class="container">
<h1>✏️ 骡式写作自检工具 · 免费版</h1>
<p class="sub">选规则，贴正文，一键检查</p>

<div class="privacy-badge" style="background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:12px 18px;margin-bottom:20px;display:flex;align-items:center;gap:10px;font-size:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)">
  <span style="font-size:20px">🔒</span>
  <span><strong>所有文本在本地运行，不上传任何服务器。</strong>你的稿子只在你自己的电脑里，谁也看不到。</span>
</div>

<div class="upgrade-bar">
  <div class="left">
    <div class="title">🔒 初级版 · 5项基础规则免费</div>
    <div class="hint">高级版6项深度规则 · 终极版每条违规附带改写指导</div>
  </div>
  <div class="right">
    <a class="ubtn" href="shop.html">升级 →</a>
  </div>
</div>

<div class="rule-pool" id="rulePool"></div>

<textarea id="input" placeholder="在此粘贴你的小说正文……"></textarea>

<div class="toolbar">
  <button class="btn" onclick="run()">检查</button>
  <button class="btn btn-sm btn-ghost" onclick="demo()">加载示例</button>
  <button class="btn btn-sm" id="scoreBtn" onclick="showFreeScore()" style="background:#c2410c;display:none">📊 评分</button>
  <span style="font-size:12px;color:#555;margin-left:auto">高级版 → <a href="pro.html" style="color:#7c3aed">pro.html</a></span>
</div>

<div class="results" id="results" style="display:none"></div>

<div class="score-section" id="scoreSection">
  <div class="score-header">
    <h2>📊 写作评分</h2>
    <div class="score-toggle" id="scoreToggle">
      <button class="active" data-mode="new" onclick="switchScore('new')">新读者标准</button>
      <button data-mode="old" onclick="switchScore('old')">老读者标准</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:30px;flex-wrap:wrap">
    <div class="score-badge">
      <div class="score-big" id="scoreBig">0</div>
      <div class="score-grade" id="scoreGradeLabel">—</div>
      <div class="score-total-label" id="scoreTotalLabel" style="font-size:13px;color:#8e8e98;margin-top:4px">新读者标准 · 总分</div>
    </div>
    <div style="flex:1;min-width:250px">
      <div class="score-dims" id="scoreDims"></div>
    </div>
  </div>
  <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:6px">
    <button class="btn btn-sm btn-ghost" onclick="toggleBreakdown()">📋 查看评分依据</button>
  </div>
  <div class="score-breakdown" id="scoreBreakdown">
    <h4>📋 评分依据</h4>
    <div id="scoreBdContent"></div>
  </div>
  <div class="score-upgrade-banner">
    <span class="txt">🔥 升级高级版/终极版 → 无限次评分 + 深度规则 + 改写指导</span>
    <a class="btn-up" href="shop.html">升级 →</a>
  </div>
  <div class="score-free-limit" id="scoreLimitMsg">🎁 免费用户24小时内可评分1次 · 升级后不限次数</div>
</div>
<div class="footer">免责声明：本工具为写作辅助，检查结果仅供参考，不可替代专业编辑审校。</div>
</div>

<script>
const rules=[
  {id:'dash',n:'破折号',d:'零容忍，全文禁止出现',l:'free'},
  {id:'excl',n:'感叹号堆叠',d:'!!？？！!等堆叠',l:'free'},
  {id:'quote',n:'引号不配对',d:'左右引号数量不一致',l:'free'},
  {id:'dedede',n:'"的地得"混用',d:'的地得使用错误',l:'free'},
  {id:'repeatchar',n:'重复字检测',d:'50字内同字≥3次报警',l:'free'},
  {id:'wc',n:'汉字字数',d:'仅汉字算字数',l:'free'},
  {id:'custom',n:'自定义禁词',d:'输入你想禁的词',l:'free'},
  {id:'de',n:'"的"字密度',d:'单句超过3个"的"',l:'free'},
  {id:'ranhou',n:'过渡词过多',d:'然后/接着/于是',l:'free'},
  {id:'haoxiang',n:'弱确定词',d:'似乎/好像/仿佛',l:'free'},
  {id:'manman',n:'慢速副词',d:'慢慢/缓缓/渐渐',l:'free'},
  {id:'aiwords',n:'AI过渡词',d:'值得注意的是/不可否认的是/显而易见/众所周知',l:'free'},
  {id:'tail',n:'追尾规则',d:'第三句是废话',l:'deep'},
  {id:'summary',n:'替读者总结',d:'他意识到/这意味着',l:'deep'},
  {id:'dialogue',n:'对话提示语',d:'人在前/中/后比例',l:'deep'},
  {id:'senses',n:'五感均衡',d:'检测缺失感官通道',l:'deep'},
  {id:'weakverb',n:'弱动词统计',d:'句首"是/在/有"',l:'deep'},
  {id:'pov',n:'视角一致性',d:'限知不泄露内心',l:'deep'},
  {id:'fight',n:'🥊 打戏专项',d:'动作密度·传导链·方向词',l:'vip'},
  {id:'write',n:'📝 文戏专项',d:'段落节奏·开篇检测·留白',l:'vip'},
];
const lbs={free:'<span class="priority pri-free">免费</span>',deep:'<span class="priority pri-deep">高级</span>',vip:'<span class="priority pri-vip">终极版</span>'};
const tips={
  dash:'成熟的网文写手不会在正文里用破折号。换逗号或者句号，节奏反而更紧。',
  excl:'两个感叹号不会让情绪加倍。真正愤怒的人声音是压低的，不是提高的。沉默比喊叫更有重量。',
};

function render(){
  document.getElementById('rulePool').innerHTML=rules.map(r=>{const can=r.l==='free';return`<div class="rule-item${can?'':' locked'}"><div class="info"><div class="name">${lbs[r.l]}${r.n}${can?'':' <span style="font-size:10px;color:#c7c7cc">🔒</span>'}</div><div class="desc">${r.d}</div></div>${can?`<label class="switch"><input type="checkbox" id="chk_${r.id}" checked onchange="tg('${r.id}',this.checked)"><span class="slider"></span></label>`:'<span style="font-size:11px;color:#c7c7cc">升级解锁</span>'}</div>`}).join('');
}
function tg(id,ch){const r=rules.find(x=>x.id===id);if(r)r.enabled=ch}
function eh(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function demo(){
  document.getElementById('input').value='## 第一章 · 示例\n\n沈森趴在一截断墙后面，呼吸压得极慢。他的手指在颤抖。他猛地听到身后传来一阵脚步声——不是一个人，是三个人的。他脑子里闪过一个念头：完了。\n\n他心里盘算着下一步该怎么办，像被什么东西拽住了一样。\n\n就在这时，一个人影冲了出来！！\n\n沈森意识到自己已经没有退路了。他握着那根铁管，心想这一下必须打中要害才行。那个动作不是攻击，是试探。';
  setTimeout(run,100);
}

function run(){
  const t=document.getElementById('input').value;
  if(!t.trim())return alert('请粘贴正文');
  // 免费版限制：每次最多10000字，每天最多3次
  if(t.length>3300)return alert('免费版每次最多检查3300字，当前 '+t.length+' 字');
  const d=new Date().toDateString(),sk='luo_free_check';
  const rec=JSON.parse(localStorage.getItem(sk)||'{}');
  if(rec.d!==d){rec.d=d;rec.n=0}
  if(rec.n>=3)return alert('😅 免费版每天只能检查3次，明天再来吧\n\n升级高级版/终极版不限次数 → shop.html');
  rec.n++;localStorage.setItem(sk,JSON.stringify(rec));
  const ls=t.split('\n'),el=document.getElementById('results');
  el.style.display='block';let html='';
  const en=rules.filter(r=>r.enabled).map(r=>r.id);

  if(en.includes('dash')){
    let is=[];ls.forEach((l,i)=>{let x=0;while((x=l.indexOf('——',x))!==-1){const s=Math.max(0,x-6),e=Math.min(l.length,x+10);is.push({l:i+1,c:(s>0?'…':'')+l.substring(s,e)+(e<l.length?'…':'')});x+=2}});
    html+=`<div class="section"><h3>📏破折号（提醒） ${is.length===0?'<span class="pass">✓</span>':'<span class="warn">⚠'+is.length+'处</span>'}</h3>${is.map(d=>`<div class="item"><span class="line-num">L${d.l}</span><span class="ctx">${eh(d.c)}</span></div>`).join('')}${is.length?`<div class="counter" style="margin-top:6px;color:#fbbf24">💡 ${tips.dash}</div>`:''}</div>`;
  }


  if(en.includes('excl')){
    let is=[];const re=/!!|\?\?|！{2,}|？{2,}/g;
    ls.forEach((l,i)=>{let m;while((m=re.exec(l))!==null){const s=Math.max(0,m.index-4),e=Math.min(l.length,m.index+m[0].length+4);is.push({l:i+1,c:(s>0?'…':'')+l.substring(s,e)+(e<l.length?'…':'')})}});
    html+=`<div class="section"><h3>📏感叹号（提醒） ${is.length===0?'<span class="pass">✓</span>':'<span class="warn">⚠'+is.length+'处</span>'}</h3>${is.map(d=>`<div class="item"><span class="line-num">L${d.l}</span><span class="ctx">${eh(d.c)}</span></div>`).join('')}${is.length?`<div class="counter" style="margin-top:6px;color:#fbbf24">💡 ${tips.excl}</div>`:''}</div>`;
  }

  var avs=['打','踢','抓','扯','拉','推','撞','压','砸','切','刺','劈','砍','捅','戳','抽','挥','甩','抡','格','挡','闪','躲','跳','翻','滚','扑','跨','蹲','蹿','蹬','旋','冲','跌','摔','撑','拽','抠','掰','锁','勒','掐','撕','顶'],sts=text.split(/[。！？\n]/).filter(function(s){return s.trim().length>3}),wk2=0;sts.forEach(function(s){var v=avs.filter(function(a){return s.includes(a)}).length;if(v<2)wk2++});var rich=sts.length>0?Math.round((1-wk2/sts.length)*100):0;
  txt+='<div class="score-bd-item"><span class="bd-label">📌 动作质量</span><span>动作富集'+rich+'% &#183; 得分'+result.scores[4].toFixed(1)+'/10</span></div>';
  var sp=['他意识到','她意识到','他明白了','这意味着','这说明','那个动作的意思是'],sc2=0;lines.forEach(function(l){sp.forEach(function(w){var x=0;while((x=l.indexOf(w,x))!==-1){sc2++;x+=w.length}})});
  var tl2=0,ps2=[];lines.forEach(function(l,i){var t=l.trim();if(t.length<3)return;var s=t.substring(0,3);if(i>0&&ps2.length&&ps2[ps2.length-1]===s)tl2++;ps2.push(s);if(ps2.length>5)ps2.shift()});
  txt+='<div class="score-bd-item"><span class="bd-label">📌 信息密度</span><span>替读者总结'+sc2+'处 &#183; 追尾'+tl2+'处 &#183; 得分'+result.scores[5].toFixed(1)+'/10</span></div>';
  var han=text.match(/[一-鿿]/g)||[],rr2=[];for(var i=0;i<han.length-50;i++){var sl=han.slice(i,i+50),f={};sl.forEach(function(c){f[c]=(f[c]||0)+1});Object.keys(f).forEach(function(c){if(f[c]>=3&&!rr2.some(function(x){return x.c===c&&Math.abs(x.i-i)<30}))rr2.push({c:c,count:f[c],i:i})})}
  txt+='<div class="score-bd-item"><span class="bd-label">📌 词汇健康</span><span>重复字类型'+rr2.length+'种 &#183; 得分'+result.scores[6].toFixed(1)+'/10</span></div>';
  var dm={左:0,右:0,前:0,后:0,上:0,下:0},td=0;lines.forEach(function(l){Object.keys(dm).forEach(function(d){var x=0;while((x=l.indexOf(d,x))!==-1){dm[d]++;td++;x++}})});
  var dirStr=Object.entries(dm).filter(function(e){return e[1]>0}).map(function(e){return e[0]+':'+e[1]}).join(' ');
  txt+='<div class="score-bd-item"><span class="bd-label">📌 画面感</span><span>方向词'+td+'个（'+dirStr+'） &#183; 得分'+result.scores[7].toFixed(1)+'/10</span></div>';
  var g2=getGrade(total,mode);
  txt+='<div class="score-bd-item" style="border-top:1px solid #edf0f5;padding-top:10px;margin-top:6px;font-weight:600"><span class="bd-label">总分</span><span>'+total+'分 &#183; '+g2.g+'级 &#183; '+g2.l+'</span></div>';
  document.getElementById('scoreBdContent').innerHTML=txt;
}
